      <script>
         $(window).scroll(function (event) {
             var scroll = $(window).scrollTop();

             if (scroll > 40) {
                 $(".ws-navbar").addClass("solid-desert");
                 $(".ws-navbar").addClass("navbar-box-shadow");
                 $(".careers-navbar").addClass("navbar-box-shadow");
             } else {
                 $(".ws-navbar").removeClass("solid-desert");
                 $(".ws-navbar").removeClass("navbar-box-shadow");
                 $(".careers-navbar").removeClass("navbar-box-shadow");
             }
         });

         $(".dropdown-item").hover(
             function () {
                 $(".ws-navbar").addClass("solid-desert");
             },
             function () {
                 if ($(document).scrollTop() < 40) {
                     $(".ws-navbar").removeClass("solid-desert");
                 }
             }
         );
      </script>
      <script>
         $(window).scroll(function (event) {
             var scroll = $(window).scrollTop();

             if (scroll > 20) {
                 $(".ws-navbar").addClass("solid-desert");
             } else {
                 $(".ws-navbar").removeClass("solid-desert");

         $(document).ready(function () {
             $('.count-number').each(function () {
                 $(this).prop('Counter', 0).animate({
                     Counter: $(this).text()
                 }, {
                     duration: 6500,
                     easing: 'swing',
                     step: function (now) {
                         $(this).text(now.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','));
                     }
                 });
             }); // end of each
         });
         document.addEventListener('DOMContentLoaded', function (event) {
             // array with texts to type in typewriter
             var dataText = ['<span class="green-col">Rev</span> Up Your Growth.<br><span class="green-col">Boost</span> Your Bottom Line.'];

             // type one text in the typwriter
             // keeps calling itself until the text is finished
             function typeWriter(text, i, fnCallback) {
                 // chekc if text isn't finished yet
                 if (i < (text.length)) {
                     // add next character to h1
                     document.querySelector('.c-headline').innerHTML = text.substring(0, i + 1) + '<span class="char" aria-hidden="true"></span>';

                     // wait for a while and call this function again for next character
                     setTimeout(function () {
                         typeWriter(text, i + 1, fnCallback)
                     }, 20);
                 }
                 // text finished, call callback if there is a callback function
                 else if (typeof fnCallback == 'function') {
                     // call callback after timeout
                     setTimeout(fnCallback, 700);
                 }
             }
             // start a typewriter animation for a text in the dataText array
             function StartTextAnimation(i) {
                 if (typeof dataText[i] == 'undefined') {
                     setTimeout(function () {
                         StartTextAnimation(0);
                     }, 20000);
                 }
                 // check if dataText[i] exists
                 // if (i < dataText[i].length) {
                 //     // text exists! start typewriter animation
                 //     typeWriter(dataText[i], 0, function () {
                 //         // after callback (and whole text has been animated), start next text
                 //         StartTextAnimation(i + 1);
                 //     });
                 // }
             }
             // start the text animation
             StartTextAnimation(0);
         });


         // Get the modal element
         var modal = document.getElementById('myModal');

         // Get the link elements to open the modal
         var links = document.getElementsByClassName('openModalLink');

         // Get the close button
         // var closeBtn = document.getElementsByClassName('close')[0];

         // Function to open the modal
         function openModal(event) {
             event.preventDefault(); // Prevent default behavior
             modal.style.display = 'block';
             event.stopPropagation(); // Stop propagation to prevent scrolling
         }

         // Attach the open modal function to each link
         for (var i = 0; i < links.length; i++) {
             links[i].onclick = openModal;
         }

         // When the user clicks on the close button, close the modal


         // When the user clicks anywhere outside of the modal, close it
         window.onclick = function (event) {
             if (event.target == modal) {
                 modal.style.display = 'none';
             }
         };

      </script>
